name: Frontend CI

on:
  push:
    branches: [master]
    paths: ["frontend/**", ".github/**"]
  pull_request:
    branches: [master]
    paths: ["frontend/**", ".github/**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - name: Type check (tsc)
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Build (tsc + vite)
        run: npm run build
        working-directory: frontend
