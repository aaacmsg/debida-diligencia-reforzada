name: E2E Tests

on:
  push:
    branches: [master]
    paths: ["backend/**", "frontend/**", ".github/**", "docker-compose.yml"]
  pull_request:
    branches: [master]
    paths: ["backend/**", "frontend/**", ".github/**", "docker-compose.yml"]

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      # El fixture de auth hace 1 login por corrida, pero los specs de login
      # y el trafico de la suite superan el limite default de 10/minuto
      LOGIN_RATE_LIMIT: 200/minute

    steps:
      - uses: actions/checkout@v4

      - name: Levantar backend (db, redis, backend)
        run: docker compose up -d --build db redis backend

      - name: Esperar backend healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then exit 0; fi
            sleep 5
          done
          echo "El backend no respondio a tiempo"
          docker compose logs backend
          exit 1

      - name: Seed de datos de demo
        run: docker compose exec -T backend python scripts/seed_demo.py

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias frontend
        run: npm ci
        working-directory: frontend

      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Ejecutar tests E2E (Playwright)
        run: npx playwright test
        working-directory: frontend

      - name: Subir reporte Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/tests/report
            frontend/test-results
          retention-days: 14
