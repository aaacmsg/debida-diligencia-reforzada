name: Backend CI

on:
  push:
    branches: [main, develop]
    paths: ["backend/**"]
  pull_request:
    branches: [main]
    paths: ["backend/**"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: diligencia_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r backend/requirements.txt
      - run: pip install flake8 bandit radon

      - name: Crear directorio de métricas
        run: mkdir -p backend/metrics

      - name: LINT - flake8
        run: flake8 backend/app --max-line-length=120 --statistics --out=backend/metrics/flake8-stats.txt || true

      - name: SECURITY - bandit
        run: bandit -r backend/app -f html -o backend/metrics/bandit-report.html || true

      - name: COMPLEXITY - radon cc
        run: radon cc backend/app -s > backend/metrics/complejidad-ciclomatica.txt

      - name: MAINTAINABILITY - radon mi
        run: radon mi backend/app -s > backend/metrics/mantenibilidad.txt

      - name: Alembic migrations
        run: alembic upgrade head
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/diligencia_db
          SECRET_KEY: ci-secret-key-not-for-production

      - name: Tests unitarios + cobertura
        run: pytest --cov=app --cov-report=html:metrics/coverage --cov-report=term --junitxml=metrics/pytest-results.xml -v
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/diligencia_db
          SECRET_KEY: ci-secret-key-not-for-production

      - name: Upload metrics artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-metrics
          path: backend/metrics/
